name: macOS Snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snapshot:
    name: macOS release a notarized snapshot
    runs-on: macos-26
    timeout-minutes: 90

    env:
      DERIVED_DATA_PATH: build/DerivedData/macos-snapshot
      CLONED_SOURCE_PACKAGES_DIR_PATH: .build/xcode-source-packages
      # Hosted runners cannot approve mlx-swift package plugins or macros interactively.
      SKIP_PACKAGE_PLUGIN_VALIDATION: "1"
      SUMIKA_GIT_COMMIT: ${{ github.sha }}
      DEVELOPER_ID_APPLICATION: Developer ID Application

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Print toolchain versions
        run: |
          uname -m
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          xcrun swift --version

      - name: Install tools
        timeout-minutes: 10
        run: |
          brew untap aws/tap || true
          brew install just create-dmg

      - name: Cache Swift package checkouts
        uses: actions/cache@v6
        with:
          path: |
            .build/xcode-source-packages
            .build/repositories
            .build/checkouts
            .build/artifacts
          key: ${{ runner.os }}-macos-snapshot-swiftpm-${{ hashFiles('Package.resolved', 'Sumika.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Verify Swift package lockfiles
        timeout-minutes: 10
        run: just check-package-locks


      - name: Import Developer ID certificate
        timeout-minutes: 5
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/sumika-signing.keychain-db"

          test -n "$MACOS_CERTIFICATE_P12_BASE64"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build notarized Release package
        timeout-minutes: 45
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          just release-notarized Sumika-macos-snapshot.dmg

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Sumika-macos-snapshot
          path: build/artifacts/Sumika-macos-snapshot.dmg
          if-no-files-found: error
