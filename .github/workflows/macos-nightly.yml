name: macOS Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test-analyze:
    name: macOS App Lint, Build, Test, Analyze
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PROJECT: Sumika.xcodeproj
      SCHEME: Sumika
      DESTINATION: platform=macOS,arch=arm64
      CONFIGURATION: Release
      DERIVED_DATA_PATH: build/DerivedData/macos-nightly
      APP_NAME: Sumika Chat
      ARTIFACT_DIR: build/artifacts
      SUMIKA_GIT_COMMIT: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Print toolchain versions
        run: |
          uname -m
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          xcrun swift --version

      - name: Install lint tools
        timeout-minutes: 10
        run: brew install just swiftlint

      - name: Run SwiftLint
        timeout-minutes: 10
        run: just lint

      - name: Cache Swift package checkouts
        uses: actions/cache@v6
        with:
          path: |
            .build/xcode-source-packages
            .build/repositories
            .build/checkouts
            .build/artifacts
          key: ${{ runner.os }}-macos-nightly-swiftpm-${{ hashFiles('Package.resolved', 'Sumika.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Resolve Swift packages
        timeout-minutes: 10
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath .build/xcode-source-packages

      - name: Build Release app
        timeout-minutes: 20
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath .build/xcode-source-packages \
            SUMIKA_GIT_COMMIT="$SUMIKA_GIT_COMMIT" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run SwiftPM core tests on macOS
        timeout-minutes: 20
        run: just test

      - name: Analyze
        timeout-minutes: 15
        run: |
          xcodebuild analyze \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath .build/xcode-source-packages \
            SUMIKA_GIT_COMMIT="$SUMIKA_GIT_COMMIT" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app artifact
        timeout-minutes: 5
        run: |
          APP_BUNDLE="$DERIVED_DATA_PATH/Build/Products/$CONFIGURATION/$APP_NAME.app"
          test -d "$APP_BUNDLE"
          mkdir -p "$ARTIFACT_DIR"
          ditto -c -k --keepParent "$APP_BUNDLE" "$ARTIFACT_DIR/Sumika-Chat-macos-nightly.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sumika-Chat-macos-nightly
          path: build/artifacts/Sumika-Chat-macos-nightly.zip
