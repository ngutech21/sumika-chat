name: macOS Release Secrets Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-release-secrets:
    name: Check macOS Release Secrets
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - name: Check Developer ID certificate secret
        timeout-minutes: 5
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/sumika-signing-check.keychain-db"

          test -n "$MACOS_CERTIFICATE_P12_BASE64"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" >/dev/null
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          identities="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>/dev/null)"
          if ! printf '%s' "$identities" | grep -q 'Developer ID Application'; then
            echo "Developer ID Application identity was not found in the imported certificate."
            exit 1
          fi

          echo "Developer ID Application certificate secret is usable."

      - name: Check App Store Connect API key secret
        timeout-minutes: 5
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          API_KEY_PATH="$RUNNER_TEMP/app-store-connect-api-key.p8"

          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_P8_BASE64"

          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"

          xcrun notarytool history \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --output-format json \
            --no-progress >/dev/null

          echo "App Store Connect API key secret is usable."
