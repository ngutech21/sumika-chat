name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Static analysis
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install lint tools
        timeout-minutes: 10
        run: brew install just swiftlint swift-format


      - name: Run format
        timeout-minutes: 10
        run: just format

      - name: Run SwiftLint
        timeout-minutes: 10
        run: just lint
    

  core-tests:
    name: macOS SumikaCore
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Install lint tools
        timeout-minutes: 10
        run: brew install just

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.2"
          skip-verify-signature: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/artifacts
          key: ${{ runner.os }}-swift-6.3.2-swiftpm-${{ hashFiles('Package.resolved') }}

      - name: Print toolchain
        run: |
          uname -a
          swift --version

      - name: Run package tests
        timeout-minutes: 30
        run: just test
