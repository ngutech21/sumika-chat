name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Static analysis
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install lint tools
        timeout-minutes: 10
        run: brew install just swiftlint swift-format


      - name: Run format
        timeout-minutes: 10
        run: just format

      - name: Run SwiftLint
        timeout-minutes: 10
        run: just lint
    

  unit-tests:
    name: macOS Core, App, and MLX unit tests
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CLONED_SOURCE_PACKAGES_DIR_PATH: .build/xcode-source-packages
      # Hosted runners cannot approve mlx-swift package plugins or macros interactively.
      SKIP_PACKAGE_PLUGIN_VALIDATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Install lint tools
        timeout-minutes: 10
        run: brew install just

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.2"
          skip-verify-signature: true

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v6
        with:
          path: |
            .build/xcode-source-packages
            .build/repositories
            .build/checkouts
            .build/artifacts
          key: ${{ runner.os }}-swift-6.3.2-swiftpm-${{ hashFiles('Package.resolved', 'Sumika.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Print toolchain
        run: |
          uname -a
          swift --version

      - name: Verify Swift package lockfiles
        timeout-minutes: 10
        run: just check-package-locks

      - name: Run unit tests
        timeout-minutes: 30
        run: just test
