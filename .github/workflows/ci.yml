name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --no-cache --config .swiftlint.yml

  build-test-analyze:
    name: Build, Test, Analyze
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PROJECT: local-coder.xcodeproj
      SCHEME: local-coder
      DESTINATION: platform=macOS,arch=arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          xcrun swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: /usr/bin/time -p xcrun swift test -Xswiftc -warnings-as-errors

      - name: Analyze
        run: |
          xcodebuild analyze \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
