name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Linux LocalCoderCore
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.2"
          skip-verify-signature: true

      - name: Print toolchain
        run: |
          uname -a
          swift --version

      - name: Build LocalCoderCore only
        run: swift build --target LocalCoderCore

      - name: Test LocalCoderCore package
        timeout-minutes: 10
        run: swift test --disable-xctest --enable-swift-testing
